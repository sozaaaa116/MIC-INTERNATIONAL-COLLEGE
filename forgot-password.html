<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password | Exam Portal</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card auth-card">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <div class="brand-title">Exam Portal</div>
            <div class="brand-subtitle">Reset Password</div>
          </div>
        </div>

        <form id="forgotPasswordForm" class="form" novalidate>
          <div class="field">
            <label for="loginId">Email or Student ID</label>
            <input id="loginId" name="loginId" autocomplete="username" required placeholder="e.g. 23CS104 or you@example.com" />
          </div>

          <div class="field">
            <label for="dob">Date of Birth</label>
            <input id="dob" name="dob" type="date" required />
            <div class="hint">We verify your account using your date of birth.</div>
          </div>

          <div class="grid-2">
            <div class="field">
              <label for="newPassword">New Password</label>
              <input id="newPassword" name="newPassword" type="password" autocomplete="new-password" required placeholder="At least 8 characters" />
            </div>
            <div class="field">
              <label for="confirmPassword">Confirm Password</label>
              <input
                id="confirmPassword"
                name="confirmPassword"
                type="password"
                autocomplete="new-password"
                required
                placeholder="Re-enter new password"
              />
            </div>
          </div>

          <div id="fpError" class="alert alert-danger" role="alert" hidden></div>
          <div id="fpOk" class="alert alert-success" role="status" hidden></div>

          <button class="btn btn-primary" type="submit">Reset Password</button>

          <div class="meta-row">
            <a href="index.html">Home</a>
            <span class="muted">|</span>
            <a href="login.html">Back to login</a>
          </div>
        </form>

        <div class="footer-note">This is a demo portal. Password reset works only for accounts with a saved date of birth.</div>
      </section>
    </main>

    <script src="assets/app.js"></script>
    <script>
      ExamPortal.guardPublicPage();
      ExamPortal.bindForgotPasswordPage();
    </script>
  </body>
</html>
