<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Login | Exam Portal</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card auth-card">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <div class="brand-title">Exam Portal</div>
            <div class="brand-subtitle">Student Login</div>
          </div>
        </div>

        <form id="loginForm" class="form" novalidate>
          <div class="field">
            <label for="loginId">Email or Student ID</label>
            <input
              id="loginId"
              name="loginId"
              autocomplete="username"
              required
              placeholder="e.g. 23CS104 or you@example.com"
            />
            <div class="hint">Use the same email/student ID you registered with.</div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              placeholder="Your password"
            />
          </div>

          <div id="loginError" class="alert alert-danger" role="alert" hidden></div>

          <button class="btn btn-primary" type="submit">Login</button>

          <div class="meta-row">
            <a href="index.html">Home</a>
            <span class="muted">|</span>
            <a href="forgot-password.html">Forgot password?</a>
            <span class="muted">|</span>
            <span class="muted">No account?</span>
            <a href="register.html">Create student account</a>
          </div>
        </form>

        <div class="footer-note">This is a demo portal. Data is saved in your browser (LocalStorage).</div>
      </section>
    </main>

    <script src="assets/app.js"></script>
    <script>
      ExamPortal.guardPublicPage();
      ExamPortal.bindLoginPage();
    </script>
  </body>
</html>
