<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f6ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="tileBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dfe8ff"/>
      <stop offset="1" stop-color="#f4f7ff"/>
    </linearGradient>
    <linearGradient id="tileGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dff3ea"/>
      <stop offset="1" stop-color="#f3fbf7"/>
    </linearGradient>
    <linearGradient id="tileGray" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef1f6"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0b1020" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="900" fill="url(#bg)"/>

  <!-- faint grid -->
  <g opacity="0.18">
    <path d="M0 120H1200M0 240H1200M0 360H1200M0 480H1200M0 600H1200M0 720H1200M0 840H1200" stroke="#0b1020" stroke-width="1"/>
    <path d="M120 0V900M240 0V900M360 0V900M480 0V900M600 0V900M720 0V900M840 0V900M960 0V900M1080 0V900" stroke="#0b1020" stroke-width="1"/>
  </g>

  <!-- floating rounded squares -->
  <rect x="64" y="50" width="210" height="210" rx="44" fill="url(#tileBlue)" stroke="#0b1020" stroke-opacity="0.10" filter="url(#softShadow)"/>
  <rect x="314" y="90" width="560" height="520" rx="64" fill="#ffffff" stroke="#0b1020" stroke-opacity="0.12" filter="url(#softShadow)"/>
  <rect x="900" y="130" width="168" height="168" rx="46" fill="url(#tileBlue)" stroke="#0b1020" stroke-opacity="0.10" filter="url(#softShadow)"/>

  <rect x="120" y="360" width="560" height="260" rx="54" fill="url(#tileGreen)" stroke="#0b1020" stroke-opacity="0.10" filter="url(#softShadow)"/>
  <rect x="356" y="440" width="520" height="280" rx="54" fill="url(#tileGray)" stroke="#0b1020" stroke-opacity="0.10" filter="url(#softShadow)"/>

  <rect x="930" y="520" width="170" height="170" rx="50" fill="url(#tileGray)" stroke="#0b1020" stroke-opacity="0.10" filter="url(#softShadow)"/>

  <!-- connector line + node (subtle) -->
  <rect x="190" y="220" width="8" height="520" rx="4" fill="#0b1020" opacity="0.10"/>
  <circle cx="194" cy="260" r="26" fill="#2B63FF" opacity="0.12"/>
  <circle cx="194" cy="260" r="10" fill="#2B63FF" opacity="0.32"/>
</svg>

